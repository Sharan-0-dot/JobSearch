spring:
  application:
    name: job-search-agent

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: qwen2.5-coder:3b
      temperature: 0.3
      timeout: 300s

    embedding-model:
      base-url: http://localhost:11434
      model-name: nomic-embed-text
      timeout: 120s

gemini:
  api:
    key: ${GEMINI_API_KEY}

jsearch:
  api:
    key: ${JSEARCH_API_KEY}
    host: jsearch.p.rapidapi.com
    base-url: https://jsearch.p.rapidapi.com

agent:
  embedding:
    dimension: 768

  search:
    top-k: 5

  memory:
    max-messages: 20

  ranking:
    skill-overlap-weight: 0.35
    location-weight: 0.20
    experience-weight: 0.15
    tech-stack-weight: 0.20
    salary-weight: 0.10

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

  endpoint:
    health:
      show-details: always